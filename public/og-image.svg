<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Spacedoku social preview</title>
  <desc id="desc">Preview card for Spacedoku, a space-themed sudoku game.</desc>
  <defs>
    <radialGradient id="nebula" cx="0.25" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#3a2977" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#0d1130" stop-opacity="1"/>
      <stop offset="1" stop-color="#05060f"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="0.85" cy="0.75" r="0.6">
      <stop offset="0" stop-color="#ff6ec7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#05060f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyanGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ef2f0"/>
      <stop offset="1" stop-color="#5ef2f0"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6ec7"/>
      <stop offset="1" stop-color="#a06bff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#nebula)"/>
  <rect width="1200" height="630" fill="url(#nebula2)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="80" cy="60" r="1.6"/>
    <circle cx="180" cy="120" r="1.2" opacity="0.8"/>
    <circle cx="260" cy="40" r="1.8"/>
    <circle cx="340" cy="200" r="1"/>
    <circle cx="480" cy="80" r="1.4" opacity="0.7"/>
    <circle cx="620" cy="140" r="1.1"/>
    <circle cx="720" cy="55" r="1.7"/>
    <circle cx="820" cy="180" r="1.2" opacity="0.85"/>
    <circle cx="960" cy="70" r="1.3"/>
    <circle cx="1080" cy="130" r="1.6"/>
    <circle cx="1140" cy="220" r="1"/>
    <circle cx="130" cy="290" r="1.3" opacity="0.75"/>
    <circle cx="240" cy="470" r="1.8"/>
    <circle cx="90" cy="540" r="1.4"/>
    <circle cx="380" cy="560" r="1.1" opacity="0.9"/>
    <circle cx="560" cy="490" r="1.5"/>
    <circle cx="700" cy="580" r="1.3" opacity="0.8"/>
    <circle cx="880" cy="530" r="1.8"/>
    <circle cx="1020" cy="470" r="1.4"/>
    <circle cx="1120" cy="580" r="1.7"/>
    <circle cx="1150" cy="360" r="1.1"/>
  </g>

  <!-- sample 4x4 sudoku grid, right side -->
  <g transform="translate(770 130)">
    <rect x="0" y="0" width="360" height="360" rx="20" fill="rgba(17, 24, 58, 0.72)" stroke="rgba(94, 242, 240, 0.35)" stroke-width="2"/>
    <!-- cells -->
    <g font-family="'Orbitron', 'Avenir Next', system-ui, sans-serif" font-size="52" font-weight="800" text-anchor="middle">
      <text x="45" y="72" fill="#cdd5ff">9</text>
      <text x="135" y="72" fill="#5ef2f0">3</text>
      <text x="225" y="72" fill="#cdd5ff">7</text>
      <text x="315" y="72" fill="#5ef2f0">2</text>

      <text x="45" y="162" fill="#5ef2f0">4</text>
      <text x="135" y="162" fill="#cdd5ff">6</text>
      <text x="225" y="162" fill="#5ef2f0">1</text>
      <text x="315" y="162" fill="#cdd5ff">8</text>

      <text x="45" y="252" fill="#cdd5ff">2</text>
      <text x="135" y="252" fill="#ff6ec7">5</text>
      <text x="225" y="252" fill="#cdd5ff">9</text>
      <text x="315" y="252" fill="#5ef2f0">6</text>

      <text x="45" y="342" fill="#5ef2f0">7</text>
      <text x="135" y="342" fill="#cdd5ff">1</text>
      <text x="225" y="342" fill="#ffd76e">8</text>
      <text x="315" y="342" fill="#cdd5ff">3</text>
    </g>
    <!-- grid lines -->
    <g stroke="rgba(94, 242, 240, 0.2)" stroke-width="1" fill="none">
      <line x1="90" y1="10" x2="90" y2="350"/>
      <line x1="270" y1="10" x2="270" y2="350"/>
      <line x1="10" y1="90" x2="350" y2="90"/>
      <line x1="10" y1="270" x2="350" y2="270"/>
    </g>
    <g stroke="rgba(94, 242, 240, 0.55)" stroke-width="2" fill="none">
      <line x1="180" y1="10" x2="180" y2="350"/>
      <line x1="10" y1="180" x2="350" y2="180"/>
    </g>
    <!-- selection highlight -->
    <rect x="98" y="196" width="164" height="70" rx="8"
          fill="none" stroke="#ffd76e" stroke-width="3"
          style="filter: drop-shadow(0 0 8px rgba(255, 215, 110, 0.7));"/>
  </g>

  <!-- text block -->
  <g font-family="'Orbitron', 'Avenir Next', system-ui, sans-serif">
    <text x="80" y="220" fill="#5ef2f0" font-size="88" font-weight="900" letter-spacing="4"
          style="filter: drop-shadow(0 0 16px rgba(94, 242, 240, 0.65));">SPACE</text>
    <text x="80" y="320" fill="#ff6ec7" font-size="88" font-weight="900" letter-spacing="4"
          style="filter: drop-shadow(0 0 16px rgba(255, 110, 199, 0.65));">DOKU</text>
  </g>

  <text x="80" y="390"
        font-family="'Exo 2', 'Avenir Next', system-ui, sans-serif"
        font-size="30" fill="#8b93c9" font-weight="500" letter-spacing="1.5">
    Number puzzles from outer space
  </text>

  <!-- chips -->
  <g font-family="'Orbitron', 'Avenir Next', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="2">
    <rect x="80" y="450" width="260" height="52" rx="26" fill="rgba(94,242,240,0.12)" stroke="rgba(94,242,240,0.55)" stroke-width="1.5"/>
    <text x="210" y="484" text-anchor="middle" fill="#5ef2f0">4×4 · 6×6 · 9×9</text>

    <rect x="360" y="450" width="240" height="52" rx="26" fill="rgba(255,110,199,0.14)" stroke="rgba(255,110,199,0.55)" stroke-width="1.5"/>
    <text x="480" y="484" text-anchor="middle" fill="#ff6ec7">CADET → ALIEN</text>

    <rect x="620" y="450" width="140" height="52" rx="26" fill="rgba(160,107,255,0.14)" stroke="rgba(160,107,255,0.55)" stroke-width="1.5"/>
    <text x="690" y="484" text-anchor="middle" fill="#a06bff">OFFLINE</text>
  </g>
</svg>
